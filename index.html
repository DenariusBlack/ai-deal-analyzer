<!DOCTYPE html>
<html>
<head>
  <title>AI Deal Analyzer</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { background: #1a1a2e; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    #result { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <h1>AI Deal Analyzer</h1>
  <p>Enter deal details to get AI-powered risk and margin analysis.</p>
  <input id="product" placeholder="Product name" />
  <input id="supplier" placeholder="Supplier name" />
  <input id="price" placeholder="Unit price (USD)" />
  <input id="quantity" placeholder="Order quantity" />
  <textarea id="notes" placeholder="Additional notes (optional)" rows="3"></textarea>
  <button onclick="analyzeDeal()">Analyze Deal</button>
  <div id="result"></div>
  <script>
    async function analyzeDeal() {
      const data = {
        product: document.getElementById('product').value,
        supplier: document.getElementById('supplier').value,
        price: document.getElementById('price').value,
        quantity: document.getElementById('quantity').value,
        notes: document.getElementById('notes').value
      };
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').innerHTML = 'Analyzing...';
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      document.getElementById('result').innerHTML =
        '<h3>Analysis Result</h3>' +
        '<p><strong>Risk Level:</strong> ' + result.risk_level + '</p>' +
        '<p><strong>Estimated Margin:</strong> ' + result.estimated_margin + '</p>' +
        '<p><strong>Recommendation:</strong> ' + result.recommendation + '</p>' +
        '<p><strong>Key Factors:</strong> ' + result.key_factors + '</p>';
    }
  </script>
</body>
</html>
